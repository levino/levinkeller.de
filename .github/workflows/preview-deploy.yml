name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/levino/levinkeller.de:pr-${{ github.event.pull_request.number }}-${{ github.sha }}-amd64
          cache-from: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-amd64,mode=max

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/levino/levinkeller.de:pr-${{ github.event.pull_request.number }}-${{ github.sha }}-arm64
          cache-from: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-arm64
          cache-to: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-arm64,mode=max

  deploy-preview:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    env:
      PR_NAMESPACE: pr-${{ github.event.pull_request.number }}
      PREVIEW_HOST: pr-${{ github.event.pull_request.number }}.levinkeller.de
      IMAGE: ghcr.io/levino/levinkeller.de:pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      KUBE_SERVER: https://server.levinkeller.de:6443
      KUBE_CA: 
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag $IMAGE \
            ghcr.io/levino/levinkeller.de:pr-${{ github.event.pull_request.number }}-${{ github.sha }}-amd64 \
            ghcr.io/levino/levinkeller.de:pr-${{ github.event.pull_request.number }}-${{ github.sha }}-arm64

      - name: Get OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=levinkeller-de" | jq -r '.value')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy preview to k3s
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          echo "$KUBE_CA" | base64 -d > /tmp/kube-ca.crt
          KUBECTL="kubectl --server=$KUBE_SERVER --token=$KUBE_TOKEN --certificate-authority=/tmp/kube-ca.crt"

          $KUBECTL create namespace "$PR_NAMESPACE" --dry-run=client -o yaml | $KUBECTL apply -f -

          $KUBECTL apply -f - <<EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: levinkeller-de
            namespace: $PR_NAMESPACE
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: levinkeller-de
            template:
              metadata:
                labels:
                  app: levinkeller-de
              spec:
                containers:
                  - name: app
                    image: $IMAGE
                    ports:
                      - containerPort: 80
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: levinkeller-de
            namespace: $PR_NAMESPACE
          spec:
            selector:
              app: levinkeller-de
            ports:
              - port: 80
                targetPort: 80
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: levinkeller-de
            namespace: $PR_NAMESPACE
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt
          spec:
            ingressClassName: traefik
            rules:
              - host: $PREVIEW_HOST
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: levinkeller-de
                          port:
                            number: 80
            tls:
              - hosts:
                  - $PREVIEW_HOST
                secretName: levinkeller-de-tls
          EOF

      - name: Wait for rollout
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          kubectl rollout status deployment/levinkeller-de \
            -n "$PR_NAMESPACE" \
            --server="$KUBE_SERVER" \
            --token="$KUBE_TOKEN" \
            --certificate-authority=/tmp/kube-ca.crt \
            --timeout=5m

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deployment')
            )
            const body = `### Preview deployment\n\nhttps://${{ env.PREVIEW_HOST }}`
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
