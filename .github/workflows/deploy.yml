name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/levino/levinkeller.de:${{ github.sha }}
            ghcr.io/levino/levinkeller.de:latest

      - name: Get OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=levinkeller-de" | jq -r '.value')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to k3s
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          kubectl set image deployment/levinkeller-de \
            app=ghcr.io/levino/levinkeller.de:${{ github.sha }} \
            -n levinkeller-de \
            --server=https://116.202.20.205:6443 \
            --token="$KUBE_TOKEN" \
            --certificate-authority=<(echo '' | base64 -d)
