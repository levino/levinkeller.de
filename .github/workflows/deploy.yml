name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/levino/levinkeller.de:${{ github.sha }}-amd64
          cache-from: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-amd64
          cache-to: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-amd64,mode=max

  build-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/levino/levinkeller.de:${{ github.sha }}-arm64
          cache-from: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-arm64
          cache-to: type=registry,ref=ghcr.io/levino/levinkeller.de:buildcache-arm64,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    env:
      KUBE_SERVER: https://server.levinkeller.de:6443
      KUBE_CA: 
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/levino/levinkeller.de:${{ github.sha }} \
            --tag ghcr.io/levino/levinkeller.de:latest \
            ghcr.io/levino/levinkeller.de:${{ github.sha }}-amd64 \
            ghcr.io/levino/levinkeller.de:${{ github.sha }}-arm64

      - name: Get OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=levinkeller-de" | jq -r '.value')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy to k3s
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          echo "$KUBE_CA" | base64 -d > /tmp/kube-ca.crt
          kubectl set image deployment/levinkeller-de \
            app=ghcr.io/levino/levinkeller.de:${{ github.sha }} \
            -n levinkeller-de \
            --server="$KUBE_SERVER" \
            --token="$KUBE_TOKEN" \
            --certificate-authority=/tmp/kube-ca.crt

      - name: Wait for rollout
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          kubectl rollout status deployment/levinkeller-de \
            -n levinkeller-de \
            --server="$KUBE_SERVER" \
            --token="$KUBE_TOKEN" \
            --certificate-authority=/tmp/kube-ca.crt \
            --timeout=5m
