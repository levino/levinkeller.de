name: Preview Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  id-token: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest
    env:
      PR_NAMESPACE: pr-${{ github.event.pull_request.number }}
      KUBE_SERVER: https://server.levinkeller.de:6443
      KUBE_CA: 
    steps:
      - name: Get OIDC token
        id: oidc
        run: |
          TOKEN=$(curl -sSf -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=levinkeller-de" | jq -r '.value')
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Delete preview namespace from k3s
        env:
          KUBE_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          echo "$KUBE_CA" | base64 -d > /tmp/kube-ca.crt
          kubectl delete namespace "$PR_NAMESPACE" \
            --server="$KUBE_SERVER" \
            --token="$KUBE_TOKEN" \
            --certificate-authority=/tmp/kube-ca.crt \
            --ignore-not-found
