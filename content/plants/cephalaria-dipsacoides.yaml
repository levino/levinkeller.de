name:
  latin: Cephalaria dipsacoides
  german: Anatolische Riesenskabiose
description: "Aus Anatolien stammende, hellgelb bis cremeweiss blühende Riesenskabiose, die aber nicht so hoch wird, wie die bekanntere Cephalaria gigantea (sie bleibt unter 2 m). Benötigt kaum Pflege, auch zum Verwildern geeignet. Eindrucksvolle Pflanze, und große Rarität ! Keimrate bei Saatgut Vielfalt leider sehr niedrig – anderen Anbieter probieren."
height: 150
spread: 60
