name:
  latin: Cephalaria gigantea
  german: Gelbe Riesenskabiose
description: "Aus den Schluchten des Kaukasus stammende, bis 2,50 m hoch werdende Wildstaude, die an der Basis leicht verholzt und einen imposanten, stark verzweigten Blütenstand entwickelt. An dessen Ende stehen zahlreiche, etwa 5 cm große, hellgelbe Skabiosenblüten, die gerne von Bienen und Hummeln angeflogen werden. Solitärstaude, die einigen Platz braucht. Benötigt kaum Pflege, auch zum Verwildern geeignet. Eindrucksvolle Pflanze ! Keimrate bei Saatgut Vielfalt leider sehr niedrig – anderen Anbieter probieren."
